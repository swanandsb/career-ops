<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — CV</title>
<style>
  @font-face {
    font-family: 'Space Grotesk';
    src: url('./fonts/space-grotesk-latin.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }

  @font-face {
    font-family: 'Space Grotesk';
    src: url('./fonts/space-grotesk-latin-ext.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0100-02AF, U+0304, U+0308, U+0329, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }

  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }

  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin-ext.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0100-02AF, U+0304, U+0308, U+0329, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  @page {
    size: Letter;
    margin: 0.45in;
  }

  html, body {
    width: 100%;
    height: 100%;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    font-size: 9.5px;
    line-height: 1.4;
    color: #1a1a2e;
    background: #fff;
    overflow: hidden;
  }

  .page {
    width: 100%;
    max-width: 100%;
    max-height: calc(11in - 0.9in);
    overflow: hidden;
  }

  .header {
    margin-bottom: 8px;
  }

  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    line-height: 1.1;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: #1a1a2e;
    margin-bottom: 3px;
  }

  .contact-row {
    font-size: 9.5px;
    line-height: 1.4;
    color: #4f4f4f;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .contact-row a {
    color: inherit;
    text-decoration: none;
  }

  .section {
    margin-bottom: 8px;
    break-inside: avoid;
    page-break-inside: avoid;
  }

  .section-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: hsl(187, 74%, 32%);
    margin-bottom: 4px;
    line-height: 1.2;
  }

  .summary-text {
    font-style: italic;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .skills-grid {
    display: block;
  }

  .skill-item {
    display: block;
    margin-bottom: 2px;
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .skill-item:last-child {
    margin-bottom: 0;
  }

  .job {
    margin-bottom: 4px;
    break-inside: avoid;
    page-break-inside: avoid;
  }

  .job-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 1px;
  }

  .job-company {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    color: hsl(270, 70%, 45%);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .job-period {
    font-size: 9px;
    color: #666;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .job-role {
    font-style: italic;
    color: #2f2f2f;
    margin-bottom: 1px;
  }

  .job-location {
    display: none;
  }

  .job ul {
    margin-left: 12px;
  }

  .job li {
    line-height: 1.2;
    margin-bottom: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .job li:nth-child(n+3) {
    display: none;
  }

  .project {
    margin-bottom: 4px;
    break-inside: avoid;
    page-break-inside: avoid;
  }

  .project:nth-child(n+3) {
    display: none;
  }

  .project-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    color: hsl(270, 70%, 45%);
    margin-bottom: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .project-badge,
  .project-tech {
    display: none;
  }

  .project-desc {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .edu-item {
    margin-bottom: 2px;
    break-inside: avoid;
    page-break-inside: avoid;
  }

  .edu-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .edu-title {
    font-weight: 600;
    color: #2f2f2f;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .edu-org {
    color: #2f2f2f;
    font-weight: 400;
  }

  .edu-year {
    color: #666;
    flex-shrink: 0;
  }

  .edu-desc {
    display: none;
  }

  .certifications-inline {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cert-item,
  .cert-title,
  .cert-org,
  .cert-year {
    display: inline;
    font-size: 9.5px;
    color: #2f2f2f;
  }

  .cert-item {
    margin-right: 6px;
  }

  .cert-item::after {
    content: " | ";
    color: #777;
  }

  .cert-item:last-child::after {
    content: "";
  }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>{{NAME}}</h1>
    <div class="contact-row">
      <span>{{PHONE}}</span> |
      <span>{{EMAIL}}</span> |
      <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a> |
      <a href="{{PORTFOLIO_URL}}">{{PORTFOLIO_DISPLAY}}</a> |
      <span>{{LOCATION}}</span>
    </div>
  </div>

  <div class="section">
    <div class="summary-text">{{SUMMARY_TEXT}}</div>
  </div>

  <div class="section">
    <div class="section-title">{{SECTION_SKILLS}}</div>
    <div class="skills-grid">{{SKILLS}}</div>
  </div>

  <div class="section">
    <div class="section-title">{{SECTION_EXPERIENCE}}</div>
    {{EXPERIENCE}}
  </div>

  <div class="section">
    <div class="section-title">{{SECTION_PROJECTS}}</div>
    {{PROJECTS}}
  </div>

  <div class="section">
    <div class="section-title">{{SECTION_EDUCATION}}</div>
    {{EDUCATION}}
  </div>

  <div class="section">
    <div class="section-title">{{SECTION_CERTIFICATIONS}}</div>
    <div class="certifications-inline">{{CERTIFICATIONS}}</div>
  </div>
</div>
</body>
</html>
